<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function loadMovie(movieName){
            return new Promise ((resolve,reject)=>{
                console.log(`Loading.....${movieName}`)

                setTimeout(()=>{
                    resolve(`${movieName} is ready to watch....`)
                },5000)
            })
        }
        //Asyn-It is added before the function-Asynchronous function-which can handle multiple task
        //await-Handling the waiting period
        
        async  function watchMovie(){
            console.log('Getting ready to Watch Move')

            //Wait for Movie Load
            let MovieMessage = await loadMovie("Avengers")
            console.log(MovieMessage)
            console.log("Enjoy the movie")
        }
        watchMovie()
        console.log("I will check the review till movie is loading.")
    </script>
</body>
</html>
