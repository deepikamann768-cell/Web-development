<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Main Task-Place order for pizza
        //One moree task
        function OrderPizza(name){
            //Output-Promise
            return new Promise((resolve,reject)=>{
                let PizzaReady=true;
                console.log(`Order placed for${name}`)
                
                setTimeout(()=>{
                    if (PizzaReady){
                        resolve("Pizza got delivered")
                    }else{
                        reject("Order cancelled")
                    }
                },5000)
            })
        }
        OrderPizza("Deepika")
        .then(()=>"Order confirmed")
        .then(message=>{
            console.log(message)
        })
        .catch(err=> {
            console.log(err)
        })
        //Task2:
        function surprise(){
            console.log("Hii everyone we will have a small coding contest soon-Free Goodies🎊🎊")
        }
        surprise()
    </script>
</body>
</html>
