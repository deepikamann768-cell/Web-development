<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding-top: 50px;
    background-image: url('https://images.unsplash.com/photo-1485846234645-a62644f84728?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8bW92aWV8ZW58MHx8MHx8fDA%3D');
}

.parent {
    width: 700px;
    text-align: center;
}

.search-box {
    margin-bottom: 20px;
}

input {
    padding: 10px;
    width: 60%;
    font-size: 16px;
}

button {
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
    background-color: #333;
    color: white;
    border: none;
}

.movie-card {
    background: white;
    display: flex;
    gap: 20px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    border-radius: 8px;
    text-align: left;
}

.movie-card img {
    width: 250px;
    border-radius: 8px;
}

.movie-info {
    flex: 1;
}

.error {
    color: red;
    font-weight: bold;
}
</style>
<body>
     <div class="parent">
        <h1>Movie Search</h1>

        <div class="search-box">
            <input type="text" id="movieInput" placeholder="Enter movie name">
            <button onclick="getMovie(movieInput.value)">Search</button>
        </div>

        <div id="movieResult"></div>
    </div>

    <script>
        //OmDb API-http://www.omdbapi.com/?t=MovieName&apikey=ae6291e0

async function getMovie() {

    const movieName = document.getElementById("movieInput").value;
    const resultDiv = document.getElementById("movieResult");

    if (!movieName) {
        resultDiv.innerHTML = "<p class='error'>Please enter a movie name</p>";
        return;
    }
        
            const url=`http://www.omdbapi.com/?t=${movieName}&apikey=ae6291e0`
          try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.Response === "False") {
            resultDiv.innerHTML = `<p class='error'>${data.Error}</p>`;
        } else {
            resultDiv.innerHTML = `
                <div class="movie-card">
                    <img src="${data.Poster}" alt="Poster">
                    <div class="movie-info">
                        <h2>${data.Title}</h2>
                        <p><strong>Year:</strong> ${data.Year}</p>
                        <p><strong>Genre:</strong> ${data.Genre}</p>
                        <p><strong>Plot:</strong> ${data.Plot}</p>
                    </div>
                </div>
            `;
        }

    } catch (error) {
        resultDiv.innerHTML = "<p class='error'>Error fetching movie data</p>";
    }
}
        
        
    </script>
</body>
</html>
