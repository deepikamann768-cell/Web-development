<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: palevioletred;
        }
        .container{
            width:320px;
            margin:50px auto;
            background-color: aliceblue;
            padding: 20px;
            border-radius: 10px;
        }
        textarea{
            width:100%;
            height:80px;
            padding:8px;
        }
        #submit{
            margin-top: 10px;
            padding:8px;
            width:100%;
            background-color: black;
            color:white;
            border: none;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <div class="container">
        <h2>Website Feedback</h2>

        <!--input tag doesn't allow to write multiple lines-->
        <textarea id="feedback" placeholder="Describe your issue or Feedback"></textarea>
        <p id="count">0/150</p>

        <label>Rate Experience</label>
        <select id="rating">
            <option value="">Select</option>
            <option>⭐</option>
            <option>⭐⭐</option>
            <option>⭐⭐⭐</option>
            <option>⭐⭐⭐⭐</option>
            <option>⭐⭐⭐⭐⭐</option>
        </select>

        <button id="submit" disabled>Submit</button>
        <div id="output"></div>
    </div>
    <script>
        const count=document.getElementById("count")
        const submitBtn=document.getElementById("submit")
        const output=document.getElementById("output")
        const rating=document.getElementById("rating")
        const feedback=document.getElementById("feedback")

        //update character count
        feedback.addEventListener("input",function(){
            //count.textContent=feedback.value.length + "/150"
            count.textContent=feedback.value.trim().length + "/150"//trim will not count spaces
    
        //enable button if text entered
        submitBtn.disabled=feedback.value.trim()===""
        })

        //show rating experience
        rating.addEventListener('change',function(){
            console.log("rating",rating.value);
        })

        //submit feedback form
        submitBtn.addEventListener('click',function(){
            output.style.display="block";
            output.innerHTML="Submitted"

        })

    </script>
</body>
</html>
